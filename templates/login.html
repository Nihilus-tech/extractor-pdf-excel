<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Extractor PDF</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif; background: #080808;
            color: #f0f0f0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .container { width: 100%; max-width: 380px; padding: 0 20px; }
        .logo { text-align: center; margin-bottom: 36px; }
        .logo-dot {
            width: 12px; height: 12px; background: #00BCD4;
            border-radius: 50%; display: inline-block;
            margin-right: 8px; vertical-align: middle;
        }
        .logo-text {
            font-size: 13px; font-weight: 600;
            letter-spacing: 0.1em; color: #fff; vertical-align: middle;
        }
        .card {
            background: #0f0f0f; border: 1px solid #1a1a1a;
            border-radius: 16px; padding: 32px;
        }
        .card h1 { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 6px; }
        .card p { font-size: 13px; color: #555; margin-bottom: 28px; }
        .field { margin-bottom: 16px; }
        .field label {
            display: block; font-size: 11px; color: #555;
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .field input {
            width: 100%; padding: 12px 14px; background: #141414;
            border: 1px solid #1e1e1e; border-radius: 8px; color: #fff;
            font-size: 14px; font-family: 'Inter', sans-serif;
            outline: none; transition: border-color 0.2s;
        }
        .field input:focus { border-color: #00BCD4; }
        .btn-login {
            width: 100%; padding: 13px; background: #00BCD4; color: #080808;
            border: none; border-radius: 10px; font-size: 14px; font-weight: 700;
            cursor: pointer; margin-top: 8px; transition: background 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .btn-login:hover { background: #0097A7; }
        .error-msg {
            background: #120808; border: 1px solid #c62828; border-radius: 8px;
            padding: 12px 14px; font-size: 13px; color: #EF5350; margin-bottom: 20px;
        }
        footer {
            text-align: center; font-size: 11px;
            color: #2a2a2a; margin-top: 28px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <span class="logo-dot"></span>
        <span class="logo-text">EXTRACTOR PDF → EXCEL</span>
    </div>
    <div class="card">
        <h1>Bienvenido</h1>
        <p>Inicia sesión para acceder</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="error-msg">⚠️ {{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="field">
                <label>Usuario</label>
                <input type="text" name="username" placeholder="Tu usuario" required autofocus>
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" name="password" placeholder="Tu contraseña" required>
            </div>
            <button type="submit" class="btn-login">Iniciar Sesión →</button>
        </form>
    </div>
    <footer>Acceso restringido · Solo usuarios autorizados</footer>
</div>
</body>
</html>
